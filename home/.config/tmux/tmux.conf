# Set TERM inside tmux
set -g default-terminal "tmux-256color"

set -g allow-passthrough on

# ghostty terminfo lacks only OSC 8 + CSI-u; rest already declared
set -as terminal-features 'xterm-ghostty:hyperlinks:extkeys'

# CSI-u keys: <C-,>, <C-/>, <C-S-letter>, <C-CR> reach nvim
set -g extended-keys on
set -g extended-keys-format csi-u

bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded ~/.config/tmux/tmux.conf"

# status bar
set -g status-bg "#ff9a17"

# focus events
set-option -g focus-events on

# mouse
set -g mouse on

# fast ESC for nvim
set -s escape-time 0

# base index
set -g base-index 1

# custom key bindings
bind -r D neww -c "#{pane_current_path}" "[[ -e TODO.md ]] && nvim TODO.md || nvim ~/Development/TODO.md"

bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"
